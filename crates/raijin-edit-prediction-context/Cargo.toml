[package]
name = "raijin-edit-prediction-context"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/edit_prediction_context.rs"

[dependencies]
anyhow.workspace = true
inazuma-clock = { workspace = true, package = "inazuma-clock" }
inazuma-collections = { workspace = true, package = "inazuma-collections" }
futures.workspace = true
inazuma.workspace = true
raijin-language = { workspace = true, package = "raijin-language" }
log.workspace = true
raijin-lsp = { workspace = true, package = "raijin-lsp" }
parking_lot.workspace = true
raijin-project = { workspace = true, package = "raijin-project" }
serde.workspace = true
smallvec.workspace = true
inazuma-text = { workspace = true, package = "inazuma-text" }
tree-sitter.workspace = true
inazuma-util = { workspace = true, package = "inazuma-util" }
raijin-zeta-prompt = { workspace = true, package = "raijin-zeta-prompt" }

[dev-dependencies]
env_logger.workspace = true
indoc.workspace = true
futures.workspace = true
inazuma = { workspace = true, features = ["test-support"] }
raijin-language = { workspace = true, package = "raijin-language", features = ["test-support"] }
raijin-lsp = { workspace = true, package = "raijin-lsp", features = ["test-support"] }
pretty_assertions.workspace = true
raijin-project = { workspace = true, package = "raijin-project", features = ["test-support"] }
serde_json.workspace = true
inazuma-settings-framework = { workspace = true, package = "inazuma-settings-framework", features = ["test-support"] }
inazuma-text = { workspace = true, package = "inazuma-text", features = ["test-support"] }
inazuma-util = { workspace = true, package = "inazuma-util", features = ["test-support"] }
