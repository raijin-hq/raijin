[package]
name = "raijin-component-preview"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/component_preview.rs"

[features]
default = []
test-support = ["raijin-db/test-support"]

[dependencies]
anyhow.workspace = true
raijin-client.workspace = true
inazuma-collections.workspace = true
raijin-db.workspace = true
raijin-fs.workspace = true
inazuma.workspace = true
raijin-language.workspace = true
log.workspace = true
raijin-node-runtime.workspace = true
raijin-notifications.workspace = true
raijin-project.workspace = true
raijin-release-channel.workspace = true
raijin-reqwest-client.workspace = true
raijin-session.workspace = true
inazuma-settings-framework.workspace = true
raijin-theme.workspace = true
raijin-theme-settings.workspace = true
raijin-ui.workspace = true
raijin-ui-input.workspace = true
uuid.workspace = true
raijin-workspace.workspace = true

[dev-dependencies]
inazuma-platform = { workspace = true, features = ["screen-capture"] }

[[example]]
name = "component_preview"
path = "examples/component_preview.rs"
