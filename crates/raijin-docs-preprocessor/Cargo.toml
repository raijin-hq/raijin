[package]
name = "raijin-docs-preprocessor"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[dependencies]
anyhow.workspace = true
inazuma-collections.workspace = true
jsonschema.workspace = true
# We are specifically pinning this version of mdbook, as later versions introduce issues with double-nested subdirectories.
# Ask @maxdeviant about this before bumping.
mdbook = "= 0.4.40"
regex.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true
inazuma-util.workspace = true
raijin-log.workspace = true
raijin-task.workspace = true
raijin-theme.workspace = true

[lints]
workspace = true

[[bin]]
name = "raijin-docs-preprocessor"
path = "src/main.rs"