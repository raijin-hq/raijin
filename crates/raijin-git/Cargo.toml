serde.workspace = true
smallvec.workspace = true
smol.workspace = true
inazuma-sum_tree.workspace = true
inazuma-text.workspace = true
thiserror.workspace = true
time.workspace = true
url.workspace = true
urlencoding.workspace = true
raijin-paths.workspace = true
inazuma-util.workspace = true
uuid.workspace = true
futures.workspace = true
raijin-tracing.workspace = true

[dev-dependencies]
pretty_assertions.workspace = true
