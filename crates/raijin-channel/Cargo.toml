[package]
name = "raijin-channel"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/channel.rs"
doctest = false

[features]
test-support = ["inazuma-collections/test-support", "inazuma/test-support", "raijin-rpc/test-support"]

[dependencies]
anyhow.workspace = true
raijin-client.workspace = true
inazuma-clock.workspace = true
inazuma-collections.workspace = true
futures.workspace = true
inazuma.workspace = true
raijin-language.workspace = true
log.workspace = true
postage.workspace = true
raijin-release-channel.workspace = true
raijin-rpc.workspace = true
inazuma-settings-framework.workspace = true
inazuma-text.workspace = true
time.workspace = true
inazuma-util.workspace = true

[dev-dependencies]
inazuma-collections = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
raijin-rpc = { workspace = true, features = ["test-support"] }
raijin-client = { workspace = true, features = ["test-support"] }
semver.workspace = true
inazuma-settings-framework = { workspace = true, features = ["test-support"] }
inazuma-util = { workspace = true, features = ["test-support"] }
raijin-http-client = { workspace = true, features = ["test-support"] }
