edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/buffer_diff.rs"

[features]
test-support = ["inazuma-settings-framework"]

[dependencies]
inazuma-clock.workspace = true
futures.workspace = true
git2.workspace = true
inazuma.workspace = true
raijin-language.workspace = true
