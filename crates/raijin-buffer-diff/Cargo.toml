pretty_assertions.workspace = true
inazuma-rope.workspace = true
inazuma-settings-framework = { workspace = true, optional = true }
inazuma-sum_tree.workspace = true
inazuma-text.workspace = true
tracing.workspace = true
inazuma-util.workspace = true
raijin-tracing.workspace = true

[dev-dependencies]
ctor.workspace = true
inazuma = { workspace = true, features = ["test-support"] }
rand.workspace = true

inazuma-settings-framework.workspace = true
inazuma-text = { workspace = true, features = ["test-support"] }
unindent.workspace = true
raijin-log.workspace = true

[package.metadata.cargo-machete]
ignored = ["tracing"]
