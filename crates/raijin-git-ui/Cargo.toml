raijin-editor.workspace = true
raijin-file-icons.workspace = true
futures.workspace = true
raijin-feature-flags.workspace = true
inazuma-fuzzy.workspace = true
raijin-git.workspace = true
inazuma.workspace = true
itertools.workspace = true
raijin-language.workspace = true
raijin-language-model.workspace = true
linkify.workspace = true
log.workspace = true
raijin-markdown.workspace = true
inazuma-menu.workspace = true
raijin-multi-buffer.workspace = true
raijin-notifications.workspace = true
raijin-panel.workspace = true
inazuma-picker.workspace = true
raijin-project.workspace = true
raijin-prompt-store.workspace = true
raijin-proto.workspace = true
raijin-remote-connection.workspace = true
raijin-remote.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true
smallvec.workspace = true
smol.workspace = true
strum.workspace = true
raijin-telemetry.workspace = true
raijin-theme.workspace = true
raijin-theme-settings.workspace = true
