raijin-time-format.workspace = true
raijin-ui.workspace = true
raijin-ui-input.workspace = true
inazuma-util.workspace = true
raijin-watch.workspace = true
raijin-shell.workspace = true
raijin-workspace.workspace = true
raijin-actions.workspace = true
zeroize.workspace = true
raijin-tracing.workspace = true
tracing.workspace = true
[target.'cfg(windows)'.dependencies]
windows.workspace = true

[dev-dependencies]
ctor.workspace = true
raijin-editor = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
indoc.workspace = true
pretty_assertions.workspace = true
