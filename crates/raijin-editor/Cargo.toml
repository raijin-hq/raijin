rand.workspace = true
semver.workspace = true
inazuma-settings-framework = { workspace = true, features = ["test-support"] }

inazuma-text = { workspace = true, features = ["test-support"] }
raijin-theme = { workspace = true, features = ["test-support"] }
tree-sitter-c.workspace = true
tree-sitter-html.workspace = true
tree-sitter-rust.workspace = true
tree-sitter-typescript.workspace = true
tree-sitter-yaml.workspace = true
