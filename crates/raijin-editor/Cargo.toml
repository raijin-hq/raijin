raijin-theme.workspace = true
raijin-theme-settings.workspace = true
tree-sitter-c = { workspace = true, optional = true }
tree-sitter-html = { workspace = true, optional = true }
tree-sitter-rust = { workspace = true, optional = true }
tree-sitter-typescript = { workspace = true, optional = true }
tree-sitter-python = { workspace = true, optional = true }
raijin-tracing.workspace = true
tracing.workspace = true
unicode-segmentation.workspace = true
unicode-script.workspace = true
unindent = { workspace = true, optional = true }
raijin-ui.workspace = true
raijin-ui-input.workspace = true
url.workspace = true
inazuma-util.workspace = true
uuid.workspace = true
raijin-vim-mode-setting.workspace = true
raijin-workspace.workspace = true
raijin-actions.workspace = true
raijin-log.workspace = true

[dev-dependencies]
criterion.workspace = true
ctor.workspace = true
inazuma = { workspace = true, features = ["test-support"] }
raijin-language = { workspace = true, features = ["test-support"] }
raijin-languages = {workspace = true, features = ["test-support"] }
raijin-lsp = { workspace = true, features = ["test-support"] }
raijin-markdown = { workspace = true, features = ["test-support"] }
