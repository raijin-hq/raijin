[package]
name = "raijin-editor"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/editor.rs"
doctest = false

[features]
test-support = [
    "inazuma-text/test-support",
    "raijin-language/test-support",
    "inazuma/test-support",
    "raijin-multi-buffer/test-support",
    "raijin-project/test-support",
    "raijin-theme/test-support",
    "inazuma-util/test-support",
    "raijin-workspace/test-support",
    "tree-sitter-c",
    "tree-sitter-rust",
    "tree-sitter-typescript",
    "tree-sitter-html",
    "proptest",
    "unindent",
]

[dependencies]
aho-corasick.workspace = true
anyhow.workspace = true
raijin-assets.workspace = true
raijin-breadcrumbs.workspace = true
raijin-client.workspace = true
inazuma-clock.workspace = true
inazuma-collections.workspace = true
convert_case.workspace = true
raijin-dap.workspace = true
raijin-db.workspace = true
raijin-buffer-diff.workspace = true
emojis.workspace = true
raijin-feature-flags.workspace = true
raijin-file-icons.workspace = true
futures.workspace = true
inazuma-fuzzy.workspace = true
raijin-fs.workspace = true
raijin-git.workspace = true
inazuma.workspace = true
indoc.workspace = true
raijin-edit-prediction-types.workspace = true
itertools.workspace = true
raijin-language.workspace = true
linkify.workspace = true
log.workspace = true
raijin-lsp.workspace = true
raijin-markdown.workspace = true
inazuma-menu.workspace = true
raijin-multi-buffer.workspace = true
ordered-float.workspace = true
parking_lot.workspace = true
pretty_assertions.workspace = true
raijin-project.workspace = true
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
rand.workspace = true
regex.workspace = true
raijin-rpc.workspace = true
inazuma-rope.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true
smallvec.workspace = true
smol.workspace = true
raijin-snippet.workspace = true
inazuma-sum_tree.workspace = true
raijin-task.workspace = true
