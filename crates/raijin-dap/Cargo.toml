[package]
name = "raijin-dap"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/dap.rs"
doctest = false

[features]
test-support = [
    "inazuma/test-support",
    "inazuma-util/test-support",
    "raijin-task/test-support",
    "async-pipe",
    "inazuma-settings-framework/test-support",
]

[dependencies]
anyhow.workspace = true
async-compression.workspace = true
async-pipe = { workspace = true, optional = true }
async-tar.workspace = true
async-trait.workspace = true
raijin-client.workspace = true
inazuma-collections.workspace = true
dap-types.workspace = true
raijin-fs.workspace = true
futures.workspace = true
inazuma.workspace = true
raijin-http-client.workspace = true
raijin-language.workspace = true
log.workspace = true
raijin-node-runtime.workspace = true
parking_lot.workspace = true
raijin-paths.workspace = true
raijin-proto.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true
smallvec.workspace = true
smol.workspace = true
raijin-task.workspace = true
raijin-telemetry.workspace = true
inazuma-util.workspace = true

[target.'cfg(not(windows))'.dependencies]
libc.workspace = true

[dev-dependencies]
async-pipe.workspace = true
inazuma = { workspace = true, features = ["test-support"] }
inazuma-settings-framework = { workspace = true, features = ["test-support"] }
raijin-task = { workspace = true, features = ["test-support"] }

inazuma-util = { workspace = true, features = ["test-support"] }
raijin-log.workspace = true
