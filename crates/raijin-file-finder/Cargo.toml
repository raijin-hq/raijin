[package]
name = "raijin-file-finder"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/file_finder.rs"
doctest = false

[dependencies]
anyhow.workspace = true
raijin-channel.workspace = true
raijin-client.workspace = true
inazuma-collections.workspace = true
raijin-editor.workspace = true
raijin-file-icons.workspace = true
futures.workspace = true
inazuma-fuzzy.workspace = true
inazuma.workspace = true
inazuma-menu.workspace = true
raijin-open-path-prompt.workspace = true
inazuma-picker.workspace = true
raijin-project.workspace = true
inazuma-settings-framework.workspace = true
serde.workspace = true
raijin-theme.workspace = true
raijin-ui.workspace = true
inazuma-util.workspace = true
raijin-workspace.workspace = true
raijin-actions.workspace = true
raijin-project-panel.workspace = true

[dev-dependencies]
ctor.workspace = true
raijin-editor = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }

inazuma-picker = { workspace = true, features = ["test-support"] }
pretty_assertions.workspace = true
serde_json.workspace = true
raijin-theme = { workspace = true, features = ["test-support"] }
raijin-workspace = { workspace = true, features = ["test-support"] }
raijin-log.workspace = true
raijin-remote-connection = { workspace = true, features = ["test-support"] }
raijin-theme-settings = { workspace = true, features = ["test-support"] }
