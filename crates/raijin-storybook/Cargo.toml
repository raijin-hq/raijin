[package]
name = "raijin-storybook"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[[bin]]
name = "storybook"
path = "src/storybook.rs"

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive", "string"] }
ctrlc = "3.4"
dialoguer = { version = "0.11.0", features = ["fuzzy-select"] }
raijin-editor.workspace = true
inazuma-fuzzy.workspace = true
inazuma = { workspace = true, default-features = true }
inazuma-platform.workspace = true
indoc.workspace = true
raijin-language.workspace = true
log.workspace = true
inazuma-menu.workspace = true
inazuma-picker.workspace = true
raijin-reqwest-client.workspace = true
rust-embed.workspace = true
inazuma-settings-framework.workspace = true
raijin-theme-settings.workspace = true
simplelog.workspace = true
inazuma-story.workspace = true
strum = { workspace = true, features = ["derive"] }
raijin-theme.workspace = true
raijin-title-bar = { workspace = true, features = ["stories"] }
raijin-ui = { workspace = true, features = ["stories"] }

[dev-dependencies]
inazuma = { workspace = true, features = ["test-support"] }
