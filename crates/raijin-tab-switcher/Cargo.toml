raijin-project.workspace = true
schemars.workspace = true
serde.workspace = true
inazuma-settings-framework.workspace = true
smol.workspace = true
raijin-ui.workspace = true
inazuma-util.workspace = true
raijin-workspace.workspace = true

[dev-dependencies]
ctor.workspace = true
inazuma = { workspace = true, features = ["test-support"] }
serde_json.workspace = true
raijin-theme = { workspace = true, features = ["test-support"] }
raijin-theme-settings.workspace = true
raijin-workspace = { workspace = true, features = ["test-support"] }
raijin-log.workspace = true
