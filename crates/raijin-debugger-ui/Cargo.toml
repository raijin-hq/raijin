[package]
name = "raijin-debugger-ui"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/debugger_ui.rs"
doctest = false

[features]
test-support = [
    "raijin-dap/test-support",
    "raijin-dap-adapters/test-support",
    "raijin-debugger-tools/test-support",
    "raijin-editor/test-support",
    "inazuma/test-support",
    "raijin-project/test-support",
    "inazuma-util/test-support",
    "raijin-workspace/test-support",
    "unindent",
]

[dependencies]
raijin-term.workspace = true
anyhow.workspace = true
bitflags.workspace = true
raijin-client.workspace = true
inazuma-collections.workspace = true
raijin-command-palette-hooks.workspace = true
raijin-dap.workspace = true
raijin-dap-adapters = { workspace = true, optional = true }
raijin-db.workspace = true
raijin-debugger-tools.workspace = true
raijin-editor.workspace = true
raijin-feature-flags.workspace = true
raijin-file-icons.workspace = true
futures.workspace = true
inazuma-fuzzy.workspace = true
inazuma.workspace = true
hex.workspace = true
indoc.workspace = true
itertools.workspace = true
raijin-language.workspace = true
log.workspace = true
inazuma-menu.workspace = true
raijin-notifications.workspace = true
parking_lot.workspace = true
parse_int.workspace = true
raijin-paths.workspace = true
inazuma-picker.workspace = true
pretty_assertions.workspace = true
raijin-project.workspace = true
raijin-rpc.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_json_lenient.workspace = true
inazuma-settings-framework.workspace = true
sysinfo.workspace = true
raijin-task.workspace = true
raijin-tasks-ui.workspace = true
raijin-terminal-view.workspace = true
inazuma-text.workspace = true
raijin-theme.workspace = true
raijin-theme-settings.workspace = true
tree-sitter-json.workspace = true
tree-sitter.workspace = true
raijin-ui.workspace = true
raijin-ui-input.workspace = true
unindent = { workspace = true, optional = true }
inazuma-util.workspace = true
raijin-workspace.workspace = true
raijin-actions.workspace = true

[dev-dependencies]
raijin-dap = { workspace = true, features = ["test-support"] }
raijin-dap-adapters = { workspace = true, features = ["test-support"] }
raijin-debugger-tools = { workspace = true, features = ["test-support"] }
raijin-editor = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
raijin-language = { workspace = true, features = ["test-support"] }
raijin-project = { workspace = true, features = ["test-support"] }
tree-sitter-go.workspace = true
unindent.workspace = true
inazuma-util = { workspace = true, features = ["test-support"] }
raijin-workspace = { workspace = true, features = ["test-support"] }
raijin-log.workspace = true
