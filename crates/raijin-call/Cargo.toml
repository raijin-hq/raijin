[package]
name = "raijin-call"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/call.rs"
doctest = false

[features]
test-support = [
    "raijin-client/test-support",
    "inazuma-collections/test-support",
    "inazuma/test-support",
    "raijin-livekit-client/test-support",
    "raijin-project/test-support",
    "inazuma-util/test-support",
    "raijin-workspace/test-support"
]

[dependencies]
anyhow.workspace = true
raijin-audio.workspace = true
raijin-client.workspace = true
inazuma-collections.workspace = true
raijin-fs.workspace = true
futures.workspace = true
raijin-feature-flags.workspace = true
inazuma = { workspace = true, features = ["screen-capture"] }
inazuma-tokio.workspace = true
raijin-language.workspace = true
raijin-livekit-client.workspace = true
log.workspace = true
postage.workspace = true
raijin-project.workspace = true
serde.workspace = true
inazuma-settings-framework.workspace = true
raijin-telemetry.workspace = true
inazuma-util.workspace = true
raijin-workspace.workspace = true

[dev-dependencies]
raijin-client = { workspace = true, features = ["test-support"] }
inazuma-collections = { workspace = true, features = ["test-support"] }
raijin-fs = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
raijin-language = { workspace = true, features = ["test-support"] }
raijin-project = { workspace = true, features = ["test-support"] }
inazuma-util = { workspace = true, features = ["test-support"] }
raijin-workspace = { workspace = true, features = ["test-support"] }

raijin-livekit-client = { workspace = true, features = ["test-support"] }
