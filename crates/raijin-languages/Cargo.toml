[features]
test-support = [
    "load-grammars"
]
load-grammars = [
    "raijin-grammars/load-grammars",
    "tree-sitter",
    "tree-sitter-gitcommit",
]

[dependencies]
anyhow.workspace = true
async-compression.workspace = true
async-fs.workspace = true
async-tar.workspace = true
async-trait.workspace = true
chrono.workspace = true
inazuma-collections.workspace = true
futures.workspace = true
globset.workspace = true
inazuma.workspace = true
raijin-grammars.workspace = true
raijin-http-client.workspace = true
itertools.workspace = true
raijin-json-schema-store.workspace = true
raijin-language.workspace = true
log.workspace = true
raijin-lsp.workspace = true
raijin-node-runtime.workspace = true
parking_lot.workspace = true
pet-conda.workspace = true
pet-core.workspace = true
pet-fs.workspace = true
pet-poetry.workspace = true
pet-reporter.workspace = true
pet-virtualenv.workspace = true
pet.workspace = true
raijin-project.workspace = true
regex.workspace = true
inazuma-rope.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_json_lenient.workspace = true
inazuma-settings-framework.workspace = true
smallvec.workspace = true
semver.workspace = true
smol.workspace = true
raijin-snippet.workspace = true
raijin-task.workspace = true
raijin-terminal.workspace = true
raijin-theme.workspace = true
