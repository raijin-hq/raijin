[package]
name = "raijin-multi-buffer"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/multi_buffer.rs"
doctest = false

[features]
test-support = [
    "raijin-buffer-diff/test-support",
    "inazuma/test-support",
    "raijin-language/test-support",
    "inazuma-text/test-support",
    "inazuma-util/test-support",
]

[dependencies]
anyhow.workspace = true
inazuma-clock.workspace = true
inazuma-collections.workspace = true
ctor.workspace = true
raijin-buffer-diff.workspace = true
inazuma.workspace = true
itertools.workspace = true
raijin-language.workspace = true
log.workspace = true
parking_lot.workspace = true
rand.workspace = true
inazuma-rope.workspace = true
smol.workspace = true
inazuma-settings-framework.workspace = true
serde.workspace = true
smallvec.workspace = true
inazuma-sum_tree.workspace = true
inazuma-text.workspace = true
raijin-theme.workspace = true
tree-sitter.workspace = true
raijin-tracing.workspace = true
tracing.workspace = true
inazuma-util.workspace = true
unicode-segmentation.workspace = true

[dev-dependencies]
raijin-buffer-diff = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
indoc.workspace = true
raijin-language = { workspace = true, features = ["test-support"] }
pretty_assertions.workspace = true
rand.workspace = true
inazuma-settings-framework = { workspace = true, features = ["test-support"] }
inazuma-text = { workspace = true, features = ["test-support"] }
inazuma-util = { workspace = true, features = ["test-support"] }
raijin-log.workspace = true

[package.metadata.cargo-machete]
ignored = ["tracing"]
