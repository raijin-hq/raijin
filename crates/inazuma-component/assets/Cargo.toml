[package]
name = "inazuma-component-assets"
description = "Default bundled assets for Inazuma Component."
license = "Apache-2.0"
publish = false
edition = "2024"
version = "0.1.0"

[lib]
doctest = false

[dependencies]
anyhow = "1"
inazuma = { path = "../../inazuma" }
log = "0.4"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
rust-embed = { version = "8.7.2", features = ["interpolate-folder-path", "include-exclude"] }
