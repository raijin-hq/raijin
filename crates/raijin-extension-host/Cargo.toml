[package]
name = "raijin-extension-host"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/extension_host.rs"
doctest = false

[features]
test-support = []

[dependencies]
anyhow.workspace = true
async-compression.workspace = true
async-tar.workspace = true
async-trait.workspace = true
raijin-client.workspace = true
raijin-cloud-api-types.workspace = true
inazuma-collections.workspace = true
raijin-dap.workspace = true
raijin-extension.workspace = true
raijin-fs.workspace = true
futures.workspace = true
inazuma.workspace = true
inazuma-tokio.workspace = true
raijin-http-client.workspace = true
raijin-language.workspace = true
log.workspace = true
raijin-lsp.workspace = true
moka.workspace = true
raijin-node-runtime.workspace = true
raijin-paths.workspace = true
raijin-project.workspace = true
raijin-remote.workspace = true
raijin-release-channel.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_json_lenient.workspace = true
inazuma-settings-framework.workspace = true
raijin-task.workspace = true
raijin-telemetry.workspace = true
tempfile.workspace = true
toml.workspace = true
tracing.workspace = true
url.workspace = true
inazuma-util.workspace = true
wasmparser.workspace = true
wasmtime-wasi.workspace = true
wasmtime.workspace = true
raijin-tracing.workspace = true

[dev-dependencies]
criterion.workspace = true
ctor.workspace = true
raijin-fs = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
raijin-language = { workspace = true, features = ["test-support"] }
raijin-language-extension.workspace = true
parking_lot.workspace = true
raijin-project = { workspace = true, features = ["test-support"] }

raijin-reqwest-client.workspace = true
raijin-theme = { workspace = true, features = ["test-support"] }
raijin-theme-settings.workspace = true
raijin-theme-extension.workspace = true
raijin-log.workspace = true

[[bench]]
name = "extension_compilation_benchmark"
harness = false

[package.metadata.cargo-machete]
ignored = ["tracing"]
