[package]
name = "raijin-fs"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/fs.rs"
test = false

[[test]]
name = "integration"
required-features = ["test-support"]
path = "tests/integration/main.rs"

[dependencies]
anyhow.workspace = true
async-tar.workspace = true
async-trait.workspace = true
inazuma-collections.workspace = true
futures.workspace = true
raijin-git.workspace = true
inazuma.workspace = true
ignore.workspace = true
libc.workspace = true
log.workspace = true
parking_lot.workspace = true
raijin-paths.workspace = true
inazuma-rope.workspace = true
raijin-proto.workspace = true
serde.workspace = true
serde_json.workspace = true
smol.workspace = true
tempfile.workspace = true
inazuma-text.workspace = true
time.workspace = true
inazuma-util.workspace = true
is_executable.workspace = true
notify.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
objc2.workspace = true
objc2-foundation = { workspace = true, features = ["NSString", "NSURL", "NSArray"] }
objc2-app-kit = { workspace = true, features = ["NSWorkspace"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows.workspace = true
dunce.workspace = true

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
ashpd.workspace = true

[dev-dependencies]
raijin-fs = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
raijin-git = { workspace = true, features = ["test-support"] }

[features]
test-support = ["inazuma/test-support", "raijin-git/test-support", "inazuma-util/test-support"]
