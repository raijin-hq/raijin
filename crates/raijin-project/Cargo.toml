[package]
name = "raijin-project"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/project.rs"
doctest = false
test = false

[[test]]
name = "integration"
required-features = ["test-support"]
path = "tests/integration/project_tests.rs"

[features]
test-support = [
    "raijin-buffer-diff/test-support",
    "raijin-client/test-support",
    "raijin-language/test-support",
    "raijin-remote/test-support",
    "inazuma-settings-framework/test-support",
    "raijin-snippet-provider/test-support",
    "inazuma-text/test-support",
    "raijin-prettier/test-support",
    "raijin-worktree/test-support",
    "inazuma/test-support",
    "raijin-dap/test-support",
]

[dependencies]
aho-corasick.workspace = true
anyhow.workspace = true
