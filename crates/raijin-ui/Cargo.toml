[package]
name = "raijin-ui"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
name = "raijin_ui"
path = "src/ui.rs"
doctest = false

[features]
default = []
stories = ["dep:inazuma-story"]

[dependencies]
# Framework
inazuma.workspace = true
inazuma-macros.workspace = true
inazuma-icons.workspace = true
inazuma-menu.workspace = true
inazuma-settings-framework.workspace = true
inazuma-gpui-util.workspace = true
inazuma-component-registry.workspace = true
inazuma-sum_tree.workspace = true

# Raijin
raijin-syntax.workspace = true
raijin-theme.workspace = true
raijin-ui-macros.workspace = true

# Serialization / Data
chrono.workspace = true
documented.workspace = true
itertools.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_repr.workspace = true
smallvec.workspace = true
strum.workspace = true
tracing.workspace = true
log.workspace = true

# Async
async-channel.workspace = true
futures.workspace = true

# Text / Parsing
anyhow.workspace = true
ropey.workspace = true
markdown.workspace = true
aho-corasick.workspace = true
lsp-types = { workspace = true, features = ["proposed"] }
regex.workspace = true
unicode-segmentation.workspace = true

# Misc
enum-iterator.workspace = true
notify.workspace = true
num-traits.workspace = true
once_cell.workspace = true
paste.workspace = true
raijin-i18n.workspace = true
uuid.workspace = true
instant.workspace = true

# Optional
inazuma-story = { workspace = true, optional = true }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
smol.workspace = true
tree-sitter.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
core-text.workspace = true

[target.'cfg(windows)'.dependencies]
windows.workspace = true

[dev-dependencies]
inazuma = { workspace = true, features = ["test-support"] }
indoc.workspace = true
