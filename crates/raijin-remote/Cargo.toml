[package]
name = "raijin-remote"
description = "Client-side subsystem for remote editing"
edition.workspace = true
version = "0.1.0"
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/remote.rs"
doctest = false

[features]
default = []
build-remote-server-binary = []
test-support = ["raijin-fs/test-support"]

[dependencies]
anyhow.workspace = true
raijin-askpass.workspace = true
async-trait.workspace = true
base64.workspace = true
inazuma-collections.workspace = true
raijin-fs.workspace = true
futures.workspace = true
inazuma.workspace = true
log.workspace = true
parking_lot.workspace = true
raijin-paths.workspace = true
prost.workspace = true
raijin-release-channel.workspace = true
raijin-rpc = { workspace = true, features = ["inazuma"] }
schemars.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true
smol.workspace = true
tempfile.workspace = true
thiserror.workspace = true
urlencoding.workspace = true
inazuma-util.workspace = true
which.workspace = true

[dev-dependencies]
inazuma = { workspace = true, features = ["test-support"] }
raijin-fs = { workspace = true, features = ["test-support"] }
inazuma-util = { workspace = true, features = ["test-support"] }
