[package]
name = "raijin-lsp"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/lsp.rs"
doctest = false

[features]
test-support = ["async-pipe", "inazuma-gpui-util"]

[dependencies]
anyhow.workspace = true
async-pipe = { workspace = true, optional = true }
inazuma-collections.workspace = true
inazuma-gpui-util = { workspace = true, optional = true }
futures.workspace = true
inazuma.workspace = true
log.workspace = true
lsp-types = { workspace = true, features = ["proposed"] }
parking_lot.workspace = true
postage.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
smol.workspace = true
inazuma-util.workspace = true
raijin-release-channel.workspace = true

[dev-dependencies]
async-pipe.workspace = true
inazuma-gpui-util.workspace = true
ctor.workspace = true
inazuma = { workspace = true, features = ["test-support"] }
semver.workspace = true
inazuma-util = { workspace = true, features = ["test-support"] }
raijin-log.workspace = true
