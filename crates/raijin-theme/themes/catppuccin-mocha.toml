# Catppuccin Mocha — Soothing pastel theme (darkest variant)
# https://github.com/catppuccin/catppuccin

[theme]
name = "Catppuccin Mocha"
author = "Catppuccin"
appearance = "dark"

[style]
# === Backgrounds ===
background = "#1e1e2e"
"surface.background" = "#24243e"  # surface0 blend
"elevated_surface.background" = "#313244"  # surface1
"element.background" = "#24243e"
"element.hover" = "#313244"
"element.active" = "#45475a"
"element.selected" = "#45475a"
"element.disabled" = "#24243e"
"drop_target.background" = "#a6e3a140"
"ghost_element.background" = "#00000000"
"ghost_element.hover" = "#313244"
"ghost_element.active" = "#45475a"
"ghost_element.selected" = "#45475a"

# === Borders ===
border = "#45475a"
"border.variant" = "#313244"
"border.focused" = "#89b4fa"
"border.selected" = "#89b4fa66"
"border.transparent" = "#00000000"
"border.disabled" = "#313244"

# === Text ===
text = "#cdd6f4"
"text.muted" = "#a6adc8"
"text.placeholder" = "#585b70"
"text.disabled" = "#585b70"
"text.accent" = "#89b4fa"

# === Icons ===
icon = "#cdd6f4"
"icon.muted" = "#a6adc8"
"icon.disabled" = "#585b70"
"icon.accent" = "#89b4fa"

# === Workspace Chrome ===
"status_bar.background" = "#181825"
"title_bar.background" = "#181825"
"title_bar.inactive_background" = "#11111b"
"toolbar.background" = "#1e1e2e"
"tab_bar.background" = "#181825"
"tab.active_background" = "#1e1e2e"
"tab.inactive_background" = "#181825"
"panel.background" = "#181825"

# === Editor ===
"editor.foreground" = "#cdd6f4"
"editor.background" = "#1e1e2e"
"editor.gutter.background" = "#1e1e2e"
"editor.active_line.background" = "#313244bf"
"editor.line_number" = "#585b70"
"editor.active_line_number" = "#cdd6f4"
"editor.invisible" = "#45475a"
"editor.wrap_guide" = "#45475a0d"

# === Search ===
"search.match_background" = "#f9e2af40"

# === Scrollbar ===
"scrollbar.thumb.background" = "#ffffff1a"
"scrollbar.thumb.hover_background" = "#ffffff33"
"scrollbar.track.background" = "#00000000"

# === Terminal (ANSI-16 + dim) ===
"terminal.background" = "#1e1e2e"
"terminal.accent" = "#89b4fa"
"terminal.foreground" = "#cdd6f4"
"terminal.bright_foreground" = "#e4e8f8"
"terminal.dim_foreground" = "#a6adc8"
"terminal.ansi.black" = "#45475a"
"terminal.ansi.red" = "#f38ba8"
"terminal.ansi.green" = "#a6e3a1"
"terminal.ansi.yellow" = "#f9e2af"
"terminal.ansi.blue" = "#89b4fa"
"terminal.ansi.magenta" = "#cba6f7"
"terminal.ansi.cyan" = "#94e2d5"
"terminal.ansi.white" = "#bac2de"
"terminal.ansi.bright_black" = "#585b70"
"terminal.ansi.bright_red" = "#f5a0b8"
"terminal.ansi.bright_green" = "#b8eab4"
"terminal.ansi.bright_yellow" = "#fae9c2"
"terminal.ansi.bright_blue" = "#a1c5fb"
"terminal.ansi.bright_magenta" = "#d8bbf9"
"terminal.ansi.bright_cyan" = "#abe9df"
"terminal.ansi.bright_white" = "#e4e8f8"
"terminal.ansi.dim_black" = "#303040"
"terminal.ansi.dim_red" = "#aa6175"
"terminal.ansi.dim_green" = "#749f71"
"terminal.ansi.dim_yellow" = "#ae9e7a"
"terminal.ansi.dim_blue" = "#607eaf"
"terminal.ansi.dim_magenta" = "#8e74ad"
"terminal.ansi.dim_cyan" = "#689e95"
"terminal.ansi.dim_white" = "#82889b"

# === Git / Version Control ===
"version_control.added" = "#a6e3a1"
"version_control.modified" = "#f9e2af"
"version_control.deleted" = "#f38ba8"

# === Status ===
error = "#f38ba8"
"error.background" = "#f38ba81a"
"error.border" = "#f38ba833"
warning = "#fab387"
"warning.background" = "#fab3871a"
"warning.border" = "#fab38733"
success = "#a6e3a1"
"success.background" = "#a6e3a11a"
"success.border" = "#a6e3a133"
info = "#89dceb"
"info.background" = "#89dceb1a"
"info.border" = "#89dceb33"

# === Link ===
"link_text.hover" = "#89b4fa"

# === Raijin-spezifisch (Block-System) ===
"block.success_badge" = "#a6e3a1"
"block.error_badge" = "#f38ba8"
"block.running_badge" = "#f9e2af"

# === Players ===
[[style.players]]
cursor = "#89b4fa"
background = "#89b4fa"
selection = "#89b4fa3d"

[[style.players]]
cursor = "#a6e3a1"
background = "#a6e3a1"
selection = "#a6e3a13d"

[[style.players]]
cursor = "#cba6f7"
background = "#cba6f7"
selection = "#cba6f73d"

[[style.players]]
cursor = "#f38ba8"
background = "#f38ba8"
selection = "#f38ba83d"

# === Syntax Highlighting ===
[style.syntax.attribute]
color = "#f9e2af"

[style.syntax.boolean]
color = "#fab387"

[style.syntax.comment]
color = "#6c7086"
font_style = "italic"

[style.syntax."comment.doc"]
color = "#7c8099"
font_style = "italic"

[style.syntax.constant]
color = "#fab387"

[style.syntax.constructor]
color = "#89b4fa"

[style.syntax.function]
color = "#89b4fa"

[style.syntax.keyword]
color = "#cba6f7"

[style.syntax.number]
color = "#fab387"

[style.syntax.operator]
color = "#89dceb"

[style.syntax.property]
color = "#94e2d5"

[style.syntax.string]
color = "#a6e3a1"

[style.syntax."string.escape"]
color = "#f5c2e7"

[style.syntax."string.regex"]
color = "#f5c2e7"

[style.syntax.tag]
color = "#f38ba8"

[style.syntax.type]
color = "#f9e2af"

[style.syntax.variable]
color = "#cdd6f4"

[style.syntax."variable.special"]
color = "#eba0ac"

[style.syntax.punctuation]
color = "#bac2de"

[style.syntax."punctuation.bracket"]
color = "#9399b2"

[style.syntax.title]
color = "#89b4fa"
font_weight = 700
