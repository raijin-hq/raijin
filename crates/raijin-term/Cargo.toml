[package]
name = "raijin-term"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
description = "Terminal emulation core for Raijin"

[features]
default = ["serde"]
serde = ["dep:serde", "bitflags/serde", "vte/serde"]

[dependencies]
base64.workspace = true
bitflags.workspace = true
home.workspace = true
libc.workspace = true
log.workspace = true
parking_lot.workspace = true
polling.workspace = true
regex-automata.workspace = true
# Nicht im Workspace: crate renames package to unicode-width
unicode-width = { package = "unicode-width-16", version = "0.1.0" }
vte.workspace = true
serde = { workspace = true, optional = true }

[target.'cfg(unix)'.dependencies]
rustix-openpty.workspace = true
rustix.workspace = true
signal-hook.workspace = true

[target.'cfg(windows)'.dependencies]
piper.workspace = true
miow.workspace = true
windows-sys.workspace = true

[dev-dependencies]
serde_json.workspace = true

[lints]
workspace = true
