[package]
name = "raijin-collab-ui"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/collab_ui.rs"
doctest = false

[features]
default = []
test-support = [
    "raijin-call/test-support",
    "raijin-client/test-support",
    "inazuma-collections/test-support",
    "raijin-editor/test-support",
    "inazuma/test-support",
    "raijin-project/test-support",
    "inazuma-settings-framework/test-support",
    "inazuma-util/test-support",
    "raijin-workspace/test-support",

    "raijin-title-bar/test-support",
]

[dependencies]
anyhow.workspace = true
raijin-call.workspace = true
raijin-channel.workspace = true
chrono.workspace = true
raijin-client.workspace = true
inazuma-collections.workspace = true
raijin-db.workspace = true
raijin-editor.workspace = true
futures.workspace = true
inazuma-fuzzy.workspace = true
inazuma.workspace = true
raijin-livekit-client.workspace = true
log.workspace = true
inazuma-menu.workspace = true
raijin-notifications.workspace = true
inazuma-picker.workspace = true
raijin-project.workspace = true
raijin-release-channel.workspace = true
raijin-rpc.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true
smallvec.workspace = true
raijin-telemetry.workspace = true
raijin-theme.workspace = true
raijin-theme-settings.workspace = true
time.workspace = true
raijin-time-format.workspace = true
raijin-title-bar.workspace = true
raijin-ui.workspace = true
inazuma-util.workspace = true
raijin-workspace.workspace = true
raijin-actions.workspace = true

[dev-dependencies]
raijin-call = { workspace = true, features = ["test-support"] }
raijin-client = { workspace = true, features = ["test-support"] }
inazuma-collections = { workspace = true, features = ["test-support"] }
raijin-editor = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
raijin-notifications = { workspace = true, features = ["test-support"] }

raijin-project = { workspace = true, features = ["test-support"] }
raijin-rpc = { workspace = true, features = ["test-support"] }
inazuma-settings-framework = { workspace = true, features = ["test-support"] }

inazuma-util = { workspace = true, features = ["test-support"] }

raijin-workspace = { workspace = true, features = ["test-support"] }
