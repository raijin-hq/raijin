[package]
name = "raijin-edit-prediction-cli"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[[bin]]
name = "ep"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
raijin-anthropic.workspace = true
raijin-http-client.workspace = true
chrono.workspace = true
clap = "4"
raijin-client.workspace = true
raijin-cloud-llm-client.workspace = true
inazuma-collections.workspace = true
raijin-db.workspace = true
raijin-debug-adapter-extension.workspace = true
dirs.workspace = true
raijin-extension.workspace = true
raijin-fs.workspace = true
futures.workspace = true
inazuma.workspace = true
inazuma-platform.workspace = true
inazuma-tokio.workspace = true
indoc.workspace = true
raijin-language.workspace = true
raijin-language-extension.workspace = true
raijin-language-model.workspace = true
raijin-language-models.workspace = true
raijin-languages = { workspace = true, features = ["load-grammars"] }
libc.workspace = true
log.workspace = true
raijin-node-runtime.workspace = true
raijin-open-ai.workspace = true

raijin-paths.workspace = true
raijin-project.workspace = true
raijin-prompt-store.workspace = true
raijin-release-channel.workspace = true
raijin-reqwest-client.workspace = true
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework.workspace = true
shellexpand.workspace = true
smol.workspace = true
raijin-sqlez.workspace = true
strum.workspace = true
raijin-sqlez-macros.workspace = true
# raijin-terminal-view: REMOVED — wird in Phase 20 gebaut
inazuma-util.workspace = true
raijin-watch.workspace = true
raijin-edit-prediction = { workspace = true, features = ["cli-support"] }
raijin-telemetry-events.workspace = true
wasmtime.workspace = true
raijin-zeta-prompt.workspace = true
rand.workspace = true
similar = "2.7.0"
flate2 = "1.1.8"
toml.workspace = true
rust-embed.workspace = true
gaoya = "0.2.0"

# Wasmtime is included as a dependency in order to enable the same
# features that are enabled in Raijin.
#
# If we don't enable these features we get crashes when creating
# a Tree-sitter WasmStore.
[features]
dynamic_prompts = []

[package.metadata.cargo-machete]
ignored = ["wasmtime"]

[dev-dependencies]
inazuma = { workspace = true, features = ["test-support"] }
indoc.workspace = true
pretty_assertions.workspace = true
raijin-project = { workspace = true, features = ["test-support"] }
tempfile.workspace = true
raijin-workspace = { workspace = true, features = ["test-support"] }
