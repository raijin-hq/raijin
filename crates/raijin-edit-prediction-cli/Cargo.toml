[package]
name = "raijin-edit-prediction-cli"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[[bin]]
name = "ep"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
raijin-anthropic = { workspace = true, package = "raijin-anthropic" }
raijin-http-client = { workspace = true, package = "raijin-http-client" }
chrono.workspace = true
clap = "4"
raijin-client = { workspace = true, package = "raijin-client" }
raijin-cloud-llm-client = { workspace = true, package = "raijin-cloud-llm-client" }
inazuma-collections = { workspace = true, package = "inazuma-collections" }
raijin-db = { workspace = true, package = "raijin-db" }
raijin-debug-adapter-extension = { workspace = true, package = "raijin-debug-adapter-extension" }
dirs.workspace = true
raijin-extension = { workspace = true, package = "raijin-extension" }
raijin-fs = { workspace = true, package = "raijin-fs" }
futures.workspace = true
inazuma.workspace = true
inazuma-platform = { workspace = true, package = "inazuma-platform" }
inazuma-tokio = { workspace = true, package = "inazuma-tokio" }
indoc.workspace = true
raijin-language = { workspace = true, package = "raijin-language" }
raijin-language-extension = { workspace = true, package = "raijin-language-extension" }
raijin-language-model = { workspace = true, package = "raijin-language-model" }
raijin-language-models = { workspace = true, package = "raijin-language-models" }
raijin-languages = { workspace = true, package = "raijin-languages", features = ["load-grammars"] }
libc.workspace = true
log.workspace = true
raijin-node-runtime = { workspace = true, package = "raijin-node-runtime" }
raijin-open-ai = { workspace = true, package = "raijin-open-ai" }

raijin-paths = { workspace = true, package = "raijin-paths" }
raijin-project = { workspace = true, package = "raijin-project" }
raijin-prompt-store = { workspace = true, package = "raijin-prompt-store" }
raijin-release-channel = { workspace = true, package = "raijin-release-channel" }
raijin-reqwest-client = { workspace = true, package = "raijin-reqwest-client" }
serde.workspace = true
serde_json.workspace = true
inazuma-settings-framework = { workspace = true, package = "inazuma-settings-framework" }
shellexpand.workspace = true
smol.workspace = true
raijin-sqlez = { workspace = true, package = "raijin-sqlez" }
strum.workspace = true
raijin-sqlez-macros = { workspace = true, package = "raijin-sqlez-macros" }
# raijin-terminal-view: REMOVED — wird in Phase 20 gebaut
inazuma-util = { workspace = true, package = "inazuma-util" }
raijin-watch = { workspace = true, package = "raijin-watch" }
raijin-edit-prediction = { workspace = true, package = "raijin-edit-prediction", features = ["cli-support"] }
raijin-telemetry-events = { workspace = true, package = "raijin-telemetry-events" }
wasmtime.workspace = true
raijin-zeta-prompt = { workspace = true, package = "raijin-zeta-prompt" }
rand.workspace = true
similar = "2.7.0"
flate2 = "1.1.8"
toml.workspace = true
rust-embed.workspace = true
gaoya = "0.2.0"

# Wasmtime is included as a dependency in order to enable the same
# features that are enabled in Raijin.
#
# If we don't enable these features we get crashes when creating
# a Tree-sitter WasmStore.
[features]
dynamic_prompts = []

[package.metadata.cargo-machete]
ignored = ["wasmtime"]

[dev-dependencies]
inazuma = { workspace = true, features = ["test-support"] }
indoc.workspace = true
pretty_assertions.workspace = true
raijin-project = { workspace = true, package = "raijin-project", features = ["test-support"] }
tempfile.workspace = true
raijin-workspace = { workspace = true, package = "raijin-workspace", features = ["test-support"] }
