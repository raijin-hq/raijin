[package]
name = "raijin-extension-cli"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[[bin]]
name = "raijin-extension"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive"] }
raijin-cloud-api-types.workspace = true
env_logger.workspace = true
raijin-extension.workspace = true
raijin-fs.workspace = true
inazuma-platform.workspace = true
raijin-language.workspace = true
log.workspace = true
raijin-reqwest-client.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_json_lenient.workspace = true
inazuma-settings-content.workspace = true
raijin-snippet-provider.workspace = true
raijin-task.workspace = true
raijin-theme-settings.workspace = true
tokio = { workspace = true, features = ["full"] }
toml.workspace = true
tree-sitter.workspace = true
wasmtime.workspace = true
