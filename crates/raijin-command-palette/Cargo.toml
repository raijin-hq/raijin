[package]
name = "raijin-command-palette"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[features]
test-support = ["raijin-db/test-support"]

[lib]
path = "src/command_palette.rs"
doctest = false

[dependencies]
anyhow.workspace = true
raijin-client.workspace = true
inazuma-collections.workspace = true
raijin-command-palette-hooks.workspace = true
raijin-db.workspace = true
inazuma-fuzzy.workspace = true
inazuma.workspace = true
inazuma-menu.workspace = true
log.workspace = true
inazuma-picker.workspace = true
postage.workspace = true
serde.workspace = true
inazuma-settings-framework.workspace = true
raijin-theme.workspace = true
time.workspace = true
raijin-ui.workspace = true
inazuma-util.workspace = true
raijin-telemetry.workspace = true
raijin-workspace.workspace = true
raijin-actions.workspace = true

[dev-dependencies]

raijin-db = { workspace = true, features = ["test-support"] }
raijin-editor = { workspace = true, features = ["test-support"] }

raijin-go-to-line.workspace = true
inazuma = { workspace = true, features = ["test-support"] }
raijin-language = { workspace = true, features = ["test-support"] }
inazuma-menu.workspace = true
raijin-project = { workspace = true, features = ["test-support"] }

raijin-workspace = { workspace = true, features = ["test-support"] }
raijin-theme-settings.workspace = true
