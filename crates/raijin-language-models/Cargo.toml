raijin-aws-http-client.workspace = true
base64.workspace = true
raijin-bedrock = { workspace = true, features = ["schemars"] }
raijin-client.workspace = true
raijin-cloud-api-types.workspace = true
raijin-cloud-llm-client.workspace = true
inazuma-collections.workspace = true
convert_case.workspace = true
raijin-copilot.workspace = true
raijin-copilot-chat.workspace = true
raijin-copilot-ui.workspace = true
raijin-credentials-provider.workspace = true
raijin-deepseek = { workspace = true, features = ["schemars"] }
raijin-extension.workspace = true
raijin-extension-host.workspace = true
raijin-fs.workspace = true
futures.workspace = true
raijin-google-ai = { workspace = true, features = ["schemars"] }
inazuma.workspace = true
inazuma-tokio.workspace = true
raijin-http-client.workspace = true
raijin-language.workspace = true
raijin-language-model.workspace = true
raijin-lmstudio = { workspace = true, features = ["schemars"] }
