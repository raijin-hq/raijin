[package]
name = "raijin-extension-api"
version = "0.1.0"
description = "APIs for creating Raijin extensions in Rust"
repository = "https://github.com/raijin-hq/raijin"
documentation = "https://docs.rs/raijin_extension_api"
keywords = ["raijin", "extension"]
edition.workspace = true
publish = false
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/extension_api.rs"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
wit-bindgen.workspace = true

[package.metadata.component]
target = { path = "wit" }
