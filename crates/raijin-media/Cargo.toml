[package]
name = "raijin-media"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"
description = "Bindings to macos media handling APIs for Raijin"

[lints]
workspace = true

[lib]
path = "src/media.rs"
doctest = false

[dependencies]
anyhow.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
objc2.workspace = true
objc2-core-foundation = { workspace = true, features = ["CFArray", "CFDictionary", "CFString", "CFBase"] }
objc2-core-video = { workspace = true, features = ["CVBase", "CVReturn", "CVMetalTexture", "CVMetalTextureCache", "CVPixelBuffer", "CVImageBuffer"] }
objc2-core-media = { workspace = true }
objc2-metal.workspace = true

[build-dependencies]
bindgen = "0.71"
