[package]
name = "raijin-eval"
version = "0.1.0"
publish.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later"
default-run = "raijin-eval"

[lints]
workspace = true

[[bin]]
name = "raijin-eval"
path = "src/eval.rs"

[[bin]]
name = "explorer"
path = "src/explorer.rs"

[dependencies]
raijin-acp-thread.workspace = true
