[package]
name = "raijin-workspace"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/workspace.rs"
doctest = false

[features]
test-support = [
    "raijin-client/test-support",
    "raijin-http-client/test-support",
    "raijin-db/test-support",
    "raijin-project/test-support",
    "raijin-remote/test-support",
    "raijin-session/test-support",
    "inazuma-settings-framework/test-support",
    "inazuma/test-support",
    "raijin-fs/test-support",
]

[dependencies]
any_vec.workspace = true
raijin-agent-settings.workspace = true
anyhow.workspace = true
async-recursion.workspace = true
raijin-client.workspace = true
chrono.workspace = true
inazuma-clock.workspace = true
inazuma-collections.workspace = true
inazuma-component-registry.workspace = true
raijin-db.workspace = true
raijin-feature-flags.workspace = true
raijin-fs.workspace = true
futures.workspace = true
raijin-git.workspace = true
inazuma.workspace = true
raijin-http-client.workspace = true
itertools.workspace = true
raijin-language.workspace = true
log.workspace = true
inazuma-menu.workspace = true
raijin-markdown.workspace = true
raijin-node-runtime.workspace = true
parking_lot.workspace = true
postage.workspace = true
raijin-project.workspace = true
raijin-remote.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
raijin-session.workspace = true
inazuma-settings-framework.workspace = true
smallvec.workspace = true
raijin-sqlez.workspace = true
strum.workspace = true
raijin-task.workspace = true
raijin-telemetry.workspace = true
raijin-theme.workspace = true
raijin-theme-settings.workspace = true
raijin-ui.workspace = true
inazuma-util.workspace = true
uuid.workspace = true
raijin-vim-mode-setting.workspace = true
raijin-actions.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
windows.workspace = true

[dev-dependencies]
raijin-client = { workspace = true, features = ["test-support"] }
raijin-db = { workspace = true, features = ["test-support"] }
raijin-fs = { workspace = true, features = ["test-support"] }
inazuma = { workspace = true, features = ["test-support"] }
raijin-project = { workspace = true, features = ["test-support"] }
raijin-remote = { workspace = true, features = ["test-support"] }
raijin-session = { workspace = true, features = ["test-support"] }
inazuma-settings-framework = { workspace = true, features = ["test-support"] }
raijin-http-client = { workspace = true, features = ["test-support"] }
pretty_assertions.workspace = true
tempfile.workspace = true
raijin-log.workspace = true
