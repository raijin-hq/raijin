# Raijin Dark — The default Raijin theme
# Background: #121212, Accent: #00BFFF (Cyan), Text: #f1f1f1

[theme]
name = "Raijin Dark"
author = "nyxb"
appearance = "dark"

[style]
# === Backgrounds ===
background = "oklch(0.1822 0 none)"
"surface.background" = "oklch(0.2178 0 none)"
"elevated_surface.background" = "oklch(0.252 0 none)"
"element.background" = "oklch(0.235 0 none)"
"element.hover" = "oklch(0.285 0 none)"
"element.active" = "oklch(0.3211 0 none)"
"element.selected" = "oklch(0.3211 0 none)"
"element.disabled" = "oklch(0.235 0 none)"
"drop_target.background" = "oklch(0.7554 0.1534 231.64 / 0.251)"
"ghost_element.background" = "oklch(0 0 none / 0)"
"ghost_element.hover" = "oklch(0.285 0 none)"
"ghost_element.active" = "oklch(0.3211 0 none)"
"ghost_element.selected" = "oklch(0.3211 0 none)"

# === Borders ===
border = "oklch(0.285 0 none)"
"border.variant" = "oklch(0.252 0 none)"
"border.focused" = "oklch(0.7554 0.1534 231.64)"
"border.selected" = "oklch(0.7554 0.1534 231.64 / 0.4)"
"border.transparent" = "oklch(0 0 none / 0)"
"border.disabled" = "oklch(0.235 0 none)"

# === Text ===
text = "oklch(0.9581 0 none)"
"text.muted" = "oklch(0.6268 0 none)"
"text.placeholder" = "oklch(0.4495 0 none)"
"text.disabled" = "oklch(0.4495 0 none)"
"text.accent" = "oklch(0.7554 0.1534 231.64)"

# === Icons ===
icon = "oklch(0.9581 0 none)"
"icon.muted" = "oklch(0.6268 0 none)"
"icon.disabled" = "oklch(0.4495 0 none)"
"icon.accent" = "oklch(0.7554 0.1534 231.64)"

# === Workspace Chrome ===
"status_bar.background" = "oklch(0.1822 0 none)"
"title_bar.background" = "oklch(0.1822 0 none)"
"title_bar.inactive_background" = "oklch(0.1638 0 none)"
