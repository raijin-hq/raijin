# Nord — Arctic, north-bluish color palette
# https://www.nordtheme.com

[theme]
name = "Nord"
author = "Arctic Ice Studio"
appearance = "dark"

[style]
# === Backgrounds ===
background = "#2e3440"
"surface.background" = "#3b4252"
"elevated_surface.background" = "#434c5e"
"element.background" = "#3b4252"
"element.hover" = "#434c5e"
"element.active" = "#4c566a"
"element.selected" = "#4c566a"
"element.disabled" = "#3b4252"
"drop_target.background" = "#a3be8c40"
"ghost_element.background" = "#00000000"
"ghost_element.hover" = "#434c5e"
"ghost_element.active" = "#4c566a"
"ghost_element.selected" = "#4c566a"

# === Borders ===
border = "#4c566a"
"border.variant" = "#434c5e"
"border.focused" = "#88c0d0"
"border.selected" = "#88c0d066"
"border.transparent" = "#00000000"
"border.disabled" = "#3b4252"

# === Text ===
text = "#eceff4"
"text.muted" = "#d8dee9"
"text.placeholder" = "#4c566a"
"text.disabled" = "#4c566a"
"text.accent" = "#88c0d0"

# === Icons ===
icon = "#eceff4"
"icon.muted" = "#d8dee9"
"icon.disabled" = "#4c566a"
"icon.accent" = "#88c0d0"

# === Workspace Chrome ===
"status_bar.background" = "#2e3440"
"title_bar.background" = "#2e3440"
"title_bar.inactive_background" = "#272c36"
"toolbar.background" = "#3b4252"
"tab_bar.background" = "#272c36"
"tab.active_background" = "#3b4252"
"tab.inactive_background" = "#272c36"
"panel.background" = "#272c36"

# === Editor ===
"editor.foreground" = "#eceff4"
"editor.background" = "#2e3440"
"editor.gutter.background" = "#2e3440"
"editor.active_line.background" = "#3b4252bf"
"editor.line_number" = "#4c566a"
"editor.active_line_number" = "#eceff4"
"editor.invisible" = "#4c566a"
"editor.wrap_guide" = "#4c566a0d"

# === Search ===
"search.match_background" = "#88c0d040"

# === Scrollbar ===
"scrollbar.thumb.background" = "#ffffff1a"
"scrollbar.thumb.hover_background" = "#ffffff33"
"scrollbar.track.background" = "#00000000"

# === Terminal (ANSI-16 + dim) ===
"terminal.background" = "#2e3440"
"terminal.accent" = "#88c0d0"
"terminal.foreground" = "#d8dee9"
"terminal.bright_foreground" = "#eceff4"
"terminal.dim_foreground" = "#7b88a1"
"terminal.ansi.black" = "#3b4252"
"terminal.ansi.red" = "#bf616a"
"terminal.ansi.green" = "#a3be8c"
"terminal.ansi.yellow" = "#ebcb8b"
"terminal.ansi.blue" = "#81a1c1"
"terminal.ansi.magenta" = "#b48ead"
"terminal.ansi.cyan" = "#88c0d0"
"terminal.ansi.white" = "#e5e9f0"
"terminal.ansi.bright_black" = "#4c566a"
"terminal.ansi.bright_red" = "#d08770"
"terminal.ansi.bright_green" = "#b5d19c"
"terminal.ansi.bright_yellow" = "#f0d8a8"
"terminal.ansi.bright_blue" = "#93b3d0"
"terminal.ansi.bright_magenta" = "#c5a3c1"
"terminal.ansi.bright_cyan" = "#9dd0dd"
"terminal.ansi.bright_white" = "#eceff4"
"terminal.ansi.dim_black" = "#2a2f3a"
"terminal.ansi.dim_red" = "#86444b"
"terminal.ansi.dim_green" = "#728562"
"terminal.ansi.dim_yellow" = "#a48e61"
"terminal.ansi.dim_blue" = "#5a7188"
"terminal.ansi.dim_magenta" = "#7e637a"
"terminal.ansi.dim_cyan" = "#5f8692"
"terminal.ansi.dim_white" = "#a0a5af"

# === Git / Version Control ===
"version_control.added" = "#a3be8c"
"version_control.modified" = "#ebcb8b"
"version_control.deleted" = "#bf616a"

# === Status ===
error = "#bf616a"
"error.background" = "#bf616a1a"
"error.border" = "#bf616a33"
warning = "#ebcb8b"
"warning.background" = "#ebcb8b1a"
"warning.border" = "#ebcb8b33"
success = "#a3be8c"
"success.background" = "#a3be8c1a"
"success.border" = "#a3be8c33"
info = "#88c0d0"
"info.background" = "#88c0d01a"
"info.border" = "#88c0d033"

# === Link ===
"link_text.hover" = "#88c0d0"

# === Raijin-spezifisch (Block-System) ===
"block.success_badge" = "#a3be8c"
"block.error_badge" = "#bf616a"
"block.running_badge" = "#ebcb8b"

# === Players ===
[[style.players]]
cursor = "#88c0d0"
background = "#88c0d0"
selection = "#88c0d03d"

[[style.players]]
cursor = "#a3be8c"
background = "#a3be8c"
selection = "#a3be8c3d"

[[style.players]]
cursor = "#b48ead"
background = "#b48ead"
selection = "#b48ead3d"

[[style.players]]
cursor = "#bf616a"
background = "#bf616a"
selection = "#bf616a3d"

# === Syntax Highlighting ===
[style.syntax.attribute]
color = "#8fbcbb"

[style.syntax.boolean]
color = "#d08770"

[style.syntax.comment]
color = "#616e88"
font_style = "italic"

[style.syntax."comment.doc"]
color = "#6d7b98"
font_style = "italic"

[style.syntax.constant]
color = "#d08770"

[style.syntax.constructor]
color = "#8fbcbb"

[style.syntax.function]
color = "#88c0d0"

[style.syntax.keyword]
color = "#81a1c1"

[style.syntax.number]
color = "#b48ead"

[style.syntax.operator]
color = "#81a1c1"

[style.syntax.property]
color = "#8fbcbb"

[style.syntax.string]
color = "#a3be8c"

[style.syntax."string.escape"]
color = "#ebcb8b"

[style.syntax."string.regex"]
color = "#ebcb8b"

[style.syntax.tag]
color = "#81a1c1"

[style.syntax.type]
color = "#8fbcbb"

[style.syntax.variable]
color = "#d8dee9"

[style.syntax."variable.special"]
color = "#d08770"

[style.syntax.punctuation]
color = "#eceff4"

[style.syntax."punctuation.bracket"]
color = "#d8dee9"

[style.syntax.title]
color = "#8fbcbb"
font_weight = 700
