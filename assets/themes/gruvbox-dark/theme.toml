"ghost_element.background" = "oklch(0 0 none / 0)"
"ghost_element.hover" = "oklch(0.3441 0.0066 48.52)"
"ghost_element.active" = "oklch(0.411 0.0115 51.87)"
"ghost_element.selected" = "oklch(0.411 0.0115 51.87)"

