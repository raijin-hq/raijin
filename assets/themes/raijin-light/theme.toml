# Semantic Tokens (shadcn/W3C)
# ═══════════════════════════════════════════════════════════════════════════════

primary = "oklch(0.7554 0.1534 231.64)"
primary_foreground = "oklch(0.985 0 none)"
secondary = "oklch(0.955 0 none)"
secondary_foreground = "oklch(0.2 0 none)"
muted = "oklch(0.965 0 none)"
muted_foreground = "oklch(0.45 0 none)"
accent = "oklch(0.935 0 none)"
accent_foreground = "oklch(0.2 0 none)"
destructive = "oklch(0.58 0.22 18.0)"
destructive_foreground = "oklch(0.2 0 none)"
background = "oklch(0.985 0 none)"
foreground = "oklch(0.2 0 none)"
card = "oklch(0.965 0 none)"
card_foreground = "oklch(0.2 0 none)"
popover = "oklch(0.975 0 none)"
