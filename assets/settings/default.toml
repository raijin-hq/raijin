[project.all_languages.languages."Plain Text".completions]
words = "disabled"

[project.all_languages.languages.Python.code_actions_on_format]
"source.organizeImports.ruff" = true

[project.all_languages.languages.SCSS.prettier]
allowed = true

[project.all_languages.languages.Svelte.prettier]
allowed = true
plugins = [ "prettier-plugin-svelte",]

[project.all_languages.languages.TSX.prettier]
allowed = true

[project.all_languages.languages.Twig.prettier]
allowed = true

[project.all_languages.languages.TypeScript.prettier]
allowed = true

[project.all_languages.languages."Vue.js".prettier]
allowed = true

[project.all_languages.languages.XML.prettier]
allowed = true
plugins = [ "@prettier/plugin-xml",]

[project.all_languages.languages.YAML.prettier]
allowed = true

[project.all_languages.languages.Python.formatter.language_server]
name = "ruff"
