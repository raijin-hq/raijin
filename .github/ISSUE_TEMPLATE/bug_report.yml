name: Bug Report
description: Report a bug in Raijin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Raijin
        2. Run command `...`
        3. Observe ...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: e.g. macOS 15.3, Ubuntu 24.04

  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: e.g. zsh 5.9, bash 5.2, fish 3.7, nushell 0.99

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs or attach screenshots.

  - type: input
    id: commit
    attributes:
      label: Raijin Version / Commit
      placeholder: e.g. main@abc1234 or v0.1.0
